services:
  postgres:
    image: postgres:15-alpine
    container_name: drivent-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-top_secret}
      POSTGRES_DB: ${POSTGRES_DATABASE:-drivent_test}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DATABASE:-drivent_test}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
